<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0F0C">
<title>GymTrack — Rutina PPL</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0F0C; --surface:#141A15; --surface2:#1C241D; --line:#26302833;
  --line-solid:#263028; --green:#3EE07A; --green-dim:#3EE07A22; --green-dark:#1E7A45;
  --text:#E8F0E9; --muted:#8FA396; --danger:#FF6B6B; --amber:#F0C862;
  --pecho:#FF6B6B; --espalda:#5EA8FF; --hombro:#FFB84D; --biceps:#C792EA;
  --triceps:#4DD0E1; --pierna:#3EE07A; --gluteo:#F472B6;
  --gemelo:#6EE7B7; --abs:#FCD34D; --casa:#6EE7B7;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100%}
body{padding-bottom:84px;overscroll-behavior-y:contain}
h1,h2,.bebas{font-family:'Bebas Neue','Inter',sans-serif;letter-spacing:.04em;font-weight:400}

header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:18px 16px 10px}
.h-row{display:flex;align-items:baseline;justify-content:space-between;max-width:560px;margin:0 auto}
header h1{font-size:30px;line-height:1}
header h1 em{font-style:normal;color:var(--green)}
.h-date{font-size:12px;color:var(--muted);text-transform:capitalize}
.wrap{padding:0 16px;max-width:560px;margin:0 auto}

nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;background:#0E130Fee;backdrop-filter:blur(12px);border-top:1px solid var(--line-solid);padding:6px 2px calc(6px + env(safe-area-inset-bottom))}
nav button{flex:1;background:none;border:0;color:var(--muted);font-family:'Inter';font-size:9.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;cursor:pointer}
nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button.active{color:var(--green)}

/* INICIO */
.todaybtn{display:flex;align-items:center;gap:12px;width:100%;background:linear-gradient(135deg,var(--green-dark),var(--green));border:0;border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer;color:#06110A;text-align:left}
.todaybtn .tb-day{font-family:'Bebas Neue';font-size:28px;line-height:1;flex:1}
.todaybtn .tb-sub{font-size:12px;font-weight:700;opacity:.85;display:block;font-family:'Inter';letter-spacing:0}
.todaybtn .tb-go{font-size:24px}
.todaybtn.restmode{background:var(--surface);color:var(--text);border:1px solid var(--line-solid)}
.todaybtn.restmode .tb-sub{color:var(--muted)}
.streak{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line-solid);border-radius:16px;padding:12px 16px;margin-bottom:12px}
.streak .fire{font-size:24px}
.streak b{font-size:18px;color:var(--green)}
.streak span{font-size:11.5px;color:var(--muted)}
.streak .hweek{margin-left:auto;text-align:right;font-size:11.5px;color:var(--muted)}
.streak .hweek b{font-size:15px;color:var(--casa)}
.warnbox{background:#8a6d1b22;border:1px solid #B8912E88;border-radius:14px;padding:12px 14px;margin-bottom:12px;font-size:12.5px;color:var(--amber)}
.warnbox button{background:none;border:0;color:var(--amber);font-weight:800;text-decoration:underline;cursor:pointer;font-size:12.5px;font-family:'Inter'}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin:4px 0 10px}
.cal-head h2{font-size:24px;text-transform:capitalize}
.cal-nav{display:flex;gap:8px}
.cal-nav button{width:38px;height:38px;border-radius:12px;border:1px solid var(--line-solid);background:var(--surface);color:var(--text);font-size:17px;cursor:pointer}
.grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.dow{text-align:center;font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;padding-bottom:4px}
.cell{aspect-ratio:1;border-radius:12px;background:var(--surface);border:1px solid var(--line-solid);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;gap:0;position:relative}
.cell small{font-size:7.5px;color:var(--muted);font-weight:700;text-transform:uppercase}
.cell.empty{background:none;border:none;cursor:default}
.cell.today{outline:2px solid var(--green);outline-offset:1px}
.cell.full{background:var(--green);color:#06110A;border-color:var(--green)}
.cell.full small{color:#06110Aaa}
.cell.partial{background:#8a6d1b33;border-color:#B8912E;color:var(--amber)}
.cell.rest-d{color:var(--muted);background:var(--surface2)}
.hdot{position:absolute;top:3px;right:4px;font-size:8px;opacity:.35;filter:grayscale(1)}
.hdot.hdone{opacity:1;filter:none}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;font-size:11.5px;color:var(--muted)}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-top:12px}

/* VISTA DE DÍA */
.dv-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.backbtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line-solid);background:var(--surface);color:var(--text);font-size:19px;cursor:pointer;flex-shrink:0}
.dv-title{flex:1}
.dv-title h2{font-size:26px;line-height:1}
.dv-title span{font-size:11.5px;color:var(--muted);text-transform:capitalize}
.compactbtn{height:40px;padding:0 13px;border-radius:12px;border:1px solid var(--line-solid);background:var(--surface);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter'}
.compactbtn.on{color:var(--green);border-color:var(--green-dark);background:var(--green-dim)}
.blockhead{display:flex;align-items:center;gap:8px;font-family:'Bebas Neue';font-size:21px;letter-spacing:.05em;margin:16px 0 9px}
.blockhead span{font-family:'Inter';font-size:11px;color:var(--muted);font-weight:700;margin-left:auto}
.pbarbox{background:var(--surface);border:1px solid var(--line-solid);border-radius:16px;padding:13px 16px;margin-bottom:12px}
.pbar{height:9px;background:var(--surface2);border-radius:99px;overflow:hidden}
.pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--green-dark),var(--green));border-radius:99px;transition:width .35s;width:0%}
.pbar.hbar>i{background:linear-gradient(90deg,#2C7A5E,var(--casa))}
.pmeta{display:flex;justify-content:space-between;margin-top:7px;font-size:11.5px;color:var(--muted)}
.pmeta b{color:var(--green)}
.rehabnote{font-size:11.5px;color:var(--amber);background:#8a6d1b1c;border:1px solid #B8912E66;border-radius:12px;padding:9px 12px;margin-bottom:10px}
.celebrate{background:linear-gradient(135deg,var(--green-dark),var(--green));color:#06110A;border-radius:18px;padding:18px;text-align:center;margin-bottom:12px}
.celebrate h2{font-size:28px;line-height:1.05}
.celebrate p{font-size:12.5px;font-weight:600;margin-top:3px}
.rest{padding:48px 20px;text-align:center}
.rest .big{font-size:52px}
.rest h2{font-size:32px;margin:10px 0 6px}
.rest p{color:var(--muted);font-size:13.5px}
.exrowD{background:var(--surface);border:1px solid var(--line-solid);border-radius:15px;padding:11px 12px;margin-bottom:8px;transition:opacity .25s}
.exrowD.donex{opacity:.45}
.exline{display:flex;align-items:center;gap:9px}
.mchip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;width:44px}
.mchip i{width:100%;height:4px;border-radius:99px}
.mchip span{font-size:8.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.exmain{flex:1;min-width:0;cursor:pointer}
.exname{font-weight:600;font-size:13.5px;line-height:1.25}
.exsub{font-size:11px;color:var(--muted);margin-top:2px}
.exsub b{color:var(--text);font-weight:600}
body.compact .exsub{display:none}
body.compact .exrowD.expanded .exsub{display:block}
.cnt{flex-shrink:0;width:62px;height:50px;border-radius:13px;border:1px solid var(--green-dark);background:var(--green-dim);color:var(--green);font-family:'Bebas Neue';font-size:24px;line-height:1;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;transition:transform .08s}
.cnt:active{transform:scale(.92)}
.cnt small{font-family:'Inter';font-size:8px;font-weight:800;letter-spacing:.07em;text-transform:uppercase}
.cnt.zero{background:var(--green);color:#06110A;border-color:var(--green);font-size:15px;font-family:'Inter';font-weight:800}
.pills{display:flex;gap:4px;margin-top:9px}
.pills i{flex:1;height:5px;border-radius:99px;background:var(--surface2);transition:background .25s}
.pills i.on{background:var(--green)}
.ro-count{flex-shrink:0;font-family:'Bebas Neue';font-size:19px;color:var(--muted)}
.ro-count.ok{color:var(--green)}
.ro-count.mid{color:var(--amber)}
.previewnote{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--line-solid);border-radius:13px;padding:11px 14px;margin-bottom:12px}

#timerbar{position:fixed;left:12px;right:12px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:40;background:var(--surface2);border:1px solid var(--green-dark);border-radius:16px;padding:12px 16px;display:none;align-items:center;gap:12px;box-shadow:0 8px 30px #000a}
#timerbar.show{display:flex}
#timerbar.alert{background:var(--green);border-color:var(--green)}
#timerbar.alert .t-time,#timerbar.alert .t-lbl{color:#06110A}
.t-time{font-family:'Bebas Neue';font-size:32px;color:var(--green);line-height:1;min-width:74px}
.t-lbl{flex:1;font-size:11px;color:var(--muted);font-weight:600;line-height:1.3}
.t-skip{background:none;border:1px solid var(--line-solid);color:var(--muted);border-radius:10px;padding:8px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter'}
#timerbar.alert .t-skip{border-color:#06110A55;color:#06110A}

/* PROGRESIÓN */
.mgroup{margin-bottom:18px}
.mgroup h3{font-family:'Bebas Neue';font-size:21px;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mgroup h3 i{width:10px;height:10px;border-radius:3px;display:inline-block}
.exrow{background:var(--surface);border:1px solid var(--line-solid);border-radius:14px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.exrow .nm{flex:1;min-width:0}
.exrow .nm b{font-size:13.5px;font-weight:600;display:block}
.exrow .nm span{font-size:11px;color:var(--muted)}
.exrow .wt{font-family:'Bebas Neue';font-size:18px;color:var(--green);white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.exrow .edit{width:34px;height:34px;border-radius:10px;border:1px solid var(--line-solid);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:14px;flex-shrink:0}
.spark{height:24px;margin-top:4px;display:block}
.sugbox{background:var(--green-dim);border:1px solid var(--green-dark);border-radius:16px;padding:14px 16px;margin-bottom:16px}
.sugbox h3{font-family:'Bebas Neue';font-size:19px;color:var(--green);margin-bottom:6px}
.sugbox li{font-size:12.5px;margin-left:16px;padding:3px 0;line-height:1.4}
.sugbox .warn{color:var(--amber)}

/* STATS */
.segbar{display:flex;gap:6px;margin-bottom:14px}
.segbar button{flex:1;padding:10px;border-radius:12px;border:1px solid var(--line-solid);background:var(--surface);color:var(--muted);font-weight:700;font-size:12.5px;cursor:pointer;font-family:'Inter'}
.segbar button.sel{background:var(--green);color:#06110A;border-color:var(--green)}
.statcards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.scard{background:var(--surface);border:1px solid var(--line-solid);border-radius:14px;padding:12px 10px;text-align:center}
.scard b{font-family:'Bebas Neue';font-size:26px;color:var(--green);display:block;line-height:1}
.scard span{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.chartbox{background:var(--surface);border:1px solid var(--line-solid);border-radius:16px;padding:16px;margin-bottom:14px}
.chartbox h3{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.chartbox h3 .cnav{display:flex;gap:6px}
.chartbox h3 .cnav button{width:30px;height:30px;border-radius:9px;border:1px solid var(--line-solid);background:var(--surface2);color:var(--text);cursor:pointer;font-size:14px}
.bars{display:flex;align-items:flex-end;gap:7px;height:130px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:5px}
.barstack{width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-end;position:relative}
.barv{width:100%;background:linear-gradient(180deg,var(--green),var(--green-dark));border-radius:6px 6px 3px 3px;min-height:0;position:relative;transition:height .4s}
.barv.hpart{background:linear-gradient(180deg,var(--casa),#2C7A5E);border-radius:6px 6px 0 0;margin-bottom:1px}
.barv em{position:absolute;top:-17px;left:0;right:0;text-align:center;font-style:normal;font-size:10px;font-weight:700;color:var(--green)}
.barl{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase}
.chartlegend{display:flex;gap:14px;font-size:10.5px;color:var(--muted);margin-top:10px}
.chartlegend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px}
.idxgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.idxcard{background:var(--surface);border:1px solid var(--line-solid);border-radius:14px;padding:12px 13px}
.idxcard .iname{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.idxcard .ival{font-family:'Bebas Neue';font-size:27px;line-height:1.1;margin:3px 0 1px}
.idxcard .imeta{font-size:10.5px;color:var(--muted)}
.i-good{color:var(--green)}.i-mid{color:var(--amber)}.i-bad{color:var(--danger)}
.mchips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px;scrollbar-width:none}
.mchips::-webkit-scrollbar{display:none}
.mchips button{flex-shrink:0;padding:8px 13px;border-radius:99px;border:1px solid var(--line-solid);background:var(--surface);color:var(--muted);font-weight:700;font-size:11.5px;cursor:pointer;font-family:'Inter'}
.mchips button.sel{background:var(--green);color:#06110A;border-color:var(--green)}
.linechart{width:100%;height:150px;display:block}
.sechead{font-family:'Bebas Neue';font-size:22px;letter-spacing:.05em;margin:20px 0 10px}

/* MEDIDAS */
.goalcard{background:linear-gradient(135deg,#1E7A4522,var(--surface));border:1px solid var(--green-dark);border-radius:18px;padding:16px;margin-bottom:14px}
.goalcard h3{font-family:'Bebas Neue';font-size:22px;margin-bottom:2px}
.goalcard .gc-sub{font-size:11.5px;color:var(--muted);margin-bottom:12px}
.goalcard .gc-nums{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:7px}
.goalcard .gc-nums b{color:var(--green)}
.mearow{background:var(--surface);border:1px solid var(--line-solid);border-radius:15px;padding:13px 15px;margin-bottom:8px}
.mearow .mtop{display:flex;align-items:center;gap:10px}
.mearow .mtop .ico{font-size:20px}
.mearow .mtop .nm{flex:1}
.mearow .mtop .nm b{font-size:14px;display:block}
.mearow .mtop .nm span{font-size:10.5px;color:var(--muted)}
.mearow .val{font-family:'Bebas Neue';font-size:24px;color:var(--green)}
.mearow .addm{width:36px;height:36px;border-radius:11px;border:1px solid var(--green-dark);background:var(--green-dim);color:var(--green);font-size:19px;cursor:pointer;flex-shrink:0}
.mhist{margin-top:10px;border-top:1px solid var(--line);padding-top:8px;font-size:11.5px}
.mhist .hrow{display:flex;justify-content:space-between;padding:3px 0;color:var(--muted)}
.mhist .hrow .delta{font-weight:700}
.d-down{color:var(--green)}.d-up{color:var(--danger)}.d-same{color:var(--muted)}
.mhist .htoggle{background:none;border:0;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;padding:4px 0;font-family:'Inter'}

/* RUTINA */
.dayselect{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none}
.dayselect::-webkit-scrollbar{display:none}
.dayselect button{flex-shrink:0;padding:9px 15px;border-radius:99px;border:1px solid var(--line-solid);background:var(--surface);color:var(--muted);font-weight:700;font-size:12.5px;cursor:pointer;font-family:'Inter'}
.dayselect button.sel{background:var(--green);color:#06110A;border-color:var(--green)}
.rrow{background:var(--surface);border:1px solid var(--line-solid);border-radius:14px;padding:12px 14px;margin-bottom:7px}
.rrow .top{display:flex;align-items:center;gap:8px}
.rrow .top b{flex:1;font-size:13.5px;font-weight:600}
.rtag{flex-shrink:0;font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:99px}
.rrow .del{background:none;border:0;color:var(--danger);font-size:16px;cursor:pointer;padding:4px}
.rrow .ctrl{display:flex;gap:8px;margin-top:9px}
.rrow .ctrl label{flex:1;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.rrow .ctrl input{width:100%;margin-top:3px;background:var(--surface2);border:1px solid var(--line-solid);border-radius:9px;color:var(--text);padding:8px;font-size:14px;font-family:'Inter'}
.addbtn{width:100%;padding:13px;border-radius:14px;border:1px dashed var(--green-dark);background:var(--green-dim);color:var(--green);font-weight:700;font-size:13px;cursor:pointer;margin:4px 0 18px;font-family:'Inter'}
.backup{background:var(--surface);border:1px solid var(--line-solid);border-radius:16px;padding:16px;margin-top:8px}
.backup h3{font-family:'Bebas Neue';font-size:20px;margin-bottom:8px}
.backup p{font-size:12px;color:var(--muted);margin-bottom:12px}
.backup .btns{display:flex;gap:8px}
.backup button{flex:1;padding:11px;border-radius:12px;border:1px solid var(--line-solid);background:var(--surface2);color:var(--text);font-weight:600;font-size:13px;cursor:pointer;font-family:'Inter'}

/* modal + toast */
.modal-bg{position:fixed;inset:0;background:#000a;z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--line-solid);border-radius:22px 22px 0 0;width:100%;max-width:560px;max-height:82vh;overflow-y:auto;padding:20px 18px calc(24px + env(safe-area-inset-bottom))}
.modal h2{font-size:25px;margin-bottom:4px}
.modal .sub{color:var(--muted);font-size:12.5px;margin-bottom:14px}
.modal input,.modal select{width:100%;background:var(--surface2);border:1px solid var(--line-solid);border-radius:12px;color:var(--text);padding:13px;font-size:15px;margin-bottom:12px;font-family:'Inter'}
.modal .mbtns{display:flex;gap:8px;margin-top:6px}
.modal .mbtns button{flex:1;padding:13px;border-radius:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Inter';border:1px solid var(--line-solid)}
.mb-ok{background:var(--green);color:#06110A;border-color:var(--green)!important}
.mb-no{background:var(--surface2);color:var(--text)}
.whist{font-size:12px;color:var(--muted);margin:4px 0 10px;list-style:none}
.whist li{padding:2px 0}
.sumgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}
.sumgrid .scard b{font-size:24px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:var(--green);color:#06110A;font-weight:700;font-size:13px;padding:11px 20px;border-radius:99px;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none;max-width:88vw;text-align:center}
.toast.show{opacity:1}
.section{display:none}
.section.active{display:block}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="h-row">

const MEASURES=[

 {k:'cuello',n:'Cuello',ico:'👔',u:'cm',freq:'mensual'},
 {k:'brazo',n:'Brazo',ico:'💪',u:'cm',dir:'up',freq:'mensual'},

/* ================= STORAGE + MIGRACIÓN ================= */
const K={ex:'gt_exercises',rt:'gt_routine',hr:'gt_home',log:'gt_log',wh:'gt_weight_hist',v:'gt_version',cp:'gt_compact',ms:'gt_measures',bk:'gt_lastbackup'};
function load(k,d){try{const x=localStorage.getItem(k);return x?JSON.parse(x):d}catch(e){return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
let EX=load(K.ex,null),RT=load(K.rt,null),HR=load(K.hr,null),LOG=load(K.log,{}),WH=load(K.wh,{}),MS=load(K.ms,null);
if(!EX){EX=DEFAULT_EX.concat(HOME_EX);save(K.ex,EX)}
if(!RT){RT=DEFAULT_ROUTINE;save(K.rt,RT)}
if(!MS){MS={cintura:[{d:'2026-07-03',v:101}],cadera:[{d:'2026-07-03',v:105}],peso:[],brazo:[],pierna:[]};save(K.ms,MS)}
if(!localStorage.getItem(K.v)){
  const t=todayStr();
  EX.forEach(e=>{if(!WH[e.id])WH[e.id]=[{d:t,w:e.w}]});
  save(K.wh,WH);localStorage.setItem(K.v,'1');
}
/* --- migración v2: bloque casa + medidas nuevas --- */
if(localStorage.getItem(K.v)!=='2'){
  const t=todayStr();
  HOME_EX.forEach(he=>{
    if(!EX.find(e=>e.id===he.id)){EX.push(JSON.parse(JSON.stringify(he)))}
    if(!WH[he.id])WH[he.id]=[{d:t,w:he.w}];
  });
  if(!HR)HR=JSON.parse(JSON.stringify(DEFAULT_HOME));
  ['pantorrilla','cuello','pecho_m','hombros'].forEach(k=>{if(!MS[k])MS[k]=[]});
  save(K.ex,EX);save(K.hr,HR);save(K.wh,WH);save(K.ms,MS);
  localStorage.setItem(K.v,'2');
}
if(!HR){HR=JSON.parse(JSON.stringify(DEFAULT_HOME));save(K.hr,HR)}
let mig=false;
EX.forEach(e=>{if(e.rest==null){e.rest=COMPOUND.includes(e.id)?150:90;mig=true}});
if(mig)save(K.ex,EX);
if(!localStorage.getItem(K.bk))localStorage.setItem(K.bk,JSON.stringify(todayStr()));
if(localStorage.getItem(K.cp)==='1')document.body.classList.add('compact');
function exById(id){return EX.find(e=>e.id===id)}

/* ================= HELPERS ================= */
const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function todayStr(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function parseDate(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function daysBetween(a,b){return Math.round((parseDate(b)-parseDate(a))/86400000)}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function toast(msg,long){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),long?3200:1800)}
function totalSets(dayKey){return (RT[dayKey]&&RT[dayKey].items||[]).reduce((a,i)=>a+Number(i.s||0),0)}
function totalHSets(wk){return (HR[wk]&&HR[wk].items||[]).reduce((a,i)=>a+Number(i.s||0),0)}
function getEntry(dateStr,dayKey){if(!LOG[dateStr])LOG[dateStr]={day:dayKey,prog:{},hprog:{}};if(!LOG[dateStr].hprog)LOG[dateStr].hprog={};return LOG[dateStr]}
function doneSets(entry){return Object.values(entry&&entry.prog||{}).reduce((a,b)=>a+b,0)}
function doneHSets(entry){return Object.values(entry&&entry.hprog||{}).reduce((a,b)=>a+b,0)}
function homeComplete(dsS){const wk=parseDate(dsS).getDay();const t=totalHSets(wk);if(!t)return null;return doneHSets(LOG[dsS])>=t}
function mchip(m){const col=MUSCLES[m]||'var(--green)';return `<div class="mchip"><i style="background:${col}"></i><span style="color:${col}">${esc(m)}</span></div>`}
function numOf(w){const m=String(w).match(/[\d.]+/);return m?parseFloat(m[0]):null}
function fmtDur(ms){const min=Math.round(ms/60000);if(min<60)return min+' min';return Math.floor(min/60)+'h '+String(min%60).padStart(2,'0')+'m'}
function latest(k){const h=MS[k]||[];return h.length?h[h.length-1].v:null}

/* ================= NAV ================= */
function go(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  document.getElementById('nb-'+tab).classList.add('active');
  if(tab==='inicio')renderInicio();
  if(tab==='stats')renderStats();
  if(tab==='medidas')renderMedidas();
  if(tab==='ejer')renderEjer();
  if(tab==='rutina')renderRutina();
  window.scrollTo(0,0);
}

/* ================= INICIO ================= */
let calY,calM;
function dayStatus(dateStr,dObj){
  const dk=dObj.getDay();
  const entry=LOG[dateStr];
  if(dk===0&&!entry)return 'rest-d';
  if(!entry)return '';
  const tot=totalSets(entry.day!=null?entry.day:dk);
  const d=doneSets(entry);
  if(tot>0&&d>=tot)return 'full';
  if(d>0||doneHSets(entry)>0)return d>0?'partial':(dk===0?'rest-d':'');
  return dk===0?'rest-d':'';
}
function calcStreak(){
  let streak=0;const now=new Date();
  const tEntry=LOG[todayStr(now)];
  const tk=now.getDay();
  const tKey=tEntry&&tEntry.day!=null?tEntry.day:tk;
  if(tEntry&&totalSets(tKey)>0&&doneSets(tEntry)>=totalSets(tKey))streak++;
  let d=new Date(now);d.setDate(d.getDate()-1);
  for(let i=0;i<730;i++){
    const dk=d.getDay();
    const e=LOG[todayStr(d)];
    if(dk===0&&(!e||doneSets(e)===0)){d.setDate(d.getDate()-1);continue}
    const kk=e&&e.day!=null?e.day:dk;
    const tot=totalSets(kk);
    if(e&&tot>0&&doneSets(e)>=tot){streak++;d.setDate(d.getDate()-1)}
    else break;
  }
  return streak;
}
function homeWeekCount(){
  const now=new Date();
  const mon=new Date(now);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  let done=0,tot=0;
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(d.getDate()+i);
    const wk=d.getDay();
    if(totalHSets(wk)>0){tot++;const c=homeComplete(todayStr(d));if(c)done++}
  }
  return {done,tot};
}
function backupOverdue(){return daysBetween(load(K.bk,todayStr()),todayStr())>=30}
function renderInicio(){
  const now=new Date(),tk=now.getDay(),tds=todayStr(now);
  document.getElementById('hdate').textContent=DIAS[tk]+' '+now.getDate()+' de '+MESES[now.getMonth()].toLowerCase();
  if(calY==null){calY=now.getFullYear();calM=now.getMonth()}
  const sec=document.getElementById('sec-inicio');
  const tEntry=LOG[tds];
  const tKey=tEntry&&tEntry.day!=null?tEntry.day:tk;
  const day=RT[tKey];
  const tot=totalSets(tKey),dn=doneSets(tEntry);
  const hTot=totalHSets(tk),hDn=doneHSets(tEntry);
  let todayBtn;
  if(tKey===0){
    todayBtn=`<button class="todaybtn restmode" onclick="openDay('${tds}')"><div class="tb-day">HOY: DESCANSO 🛌<span class="tb-sub">Recupera, mañana toca ${esc(RT[(tk+1)%7].label)}</span></div><span class="tb-go">›</span></button>`;
  }else{
    let st=dn>=tot&&tot>0?'✓ Gym completado':(dn>0?dn+'/'+tot+' series — sigue':'Toca para empezar · '+day.items.length+' ejercicios');
    if(hTot>0)st+=hDn>=hTot?' · 🏠✓':' · 🏠 pendiente';
    todayBtn=`<button class="todaybtn" onclick="openDay('${tds}')"><div class="tb-day">HOY: ${esc(day.label).toUpperCase()}<span class="tb-sub">${st}</span></div><span class="tb-go">›</span></button>`;
  }
  let warn='';
  if(backupOverdue())warn=`<div class="warnbox">⚠️ Hace más de 30 días que no haces respaldo de tus datos. <button onclick="exportData()">Exportar ahora</button></div>`;
  const first=new Date(calY,calM,1);
  const startDow=(first.getDay()+6)%7;
  const daysIn=new Date(calY,calM+1,0).getDate();
  let cells='';
  ['L','M','X','J','V','S','D'].forEach(d=>cells+=`<div class="dow">${d}</div>`);
  for(let i=0;i<startDow;i++)cells+='<div class="cell empty"></div>';
  for(let dnum=1;dnum<=daysIn;dnum++){
    const dObj=new Date(calY,calM,dnum),dsS=todayStr(dObj);
    const st=dayStatus(dsS,dObj);
    const dk2=dObj.getDay();
    const e2=LOG[dsS];
    const kk=e2&&e2.day!=null?e2.day:dk2;
    const shortLbl=kk===0?'':RT[kk].label.replace('Push ','PSH ').replace('Pull ','PLL ').replace('Pierna ','PRN ');
    let hdot='';
    if(totalHSets(dk2)>0){const hc=homeComplete(dsS);hdot=`<span class="hdot ${hc?'hdone':''}">🏠</span>`}
    cells+=`<div class="cell ${st} ${dsS===tds?'today':''}" onclick="openDay('${dsS}')">${hdot}${dnum}<small>${kk===0?'💤':esc(shortLbl)}</small></div>`;
  }
  const streak=calcStreak();
  const hw=homeWeekCount();
  sec.innerHTML=`
  ${warn}${todayBtn}
  <div class="streak"><span class="fire">🔥</span><div><b>${streak}</b> día${streak===1?'':'s'} de racha<br><span>entrenos gym completos</span></div>
  <div class="hweek"><b>🏠 ${hw.done}/${hw.tot}</b><br><span>casa esta semana</span></div></div>
  <div class="cal-head">
    <h2>${MESES[calM]} ${calY}</h2>
    <div class="cal-nav">
      <button onclick="calM--;if(calM<0){calM=11;calY--}renderInicio()">‹</button>
      <button onclick="calM++;if(calM>11){calM=0;calY++}renderInicio()">›</button>
    </div>
  </div>
  <div class="grid7">${cells}</div>
  <div class="legend">
    <span><i style="background:var(--green)"></i>Completo</span>
    <span><i style="background:#B8912E"></i>Parcial</span>
    <span><i style="background:var(--surface2)"></i>Descanso</span>
    <span>🏠 Bloque casa</span>
  </div>
  <p class="hint">Toca cualquier día para ver su rutina 👆</p>`;
}

/* ================= VISTA DE DÍA ================= */
function openDay(dsS){
  const sec=document.getElementById('sec-inicio');
  const dObj=parseDate(dsS),dk=dObj.getDay(),tds=todayStr();
  const isToday=dsS===tds,isPast=dsS<tds;
  const entry=LOG[dsS];
  const dayKey=entry&&entry.day!=null?entry.day:dk;
  const day=RT[dayKey];
  const dateTxt=DIAS[dk]+' '+dObj.getDate()+' de '+MESES[dObj.getMonth()].toLowerCase();
  const compactOn=document.body.classList.contains('compact');
  const hasHome=totalHSets(dk)>0;
  const hasGym=dayKey!==0&&day.items.length>0;

  let html=`<div class="dv-top">
    <button class="backbtn" onclick="renderInicio()">‹</button>
    <div class="dv-title"><h2>${esc(day.label)}${hasHome?' + 🏠':''}</h2><span>${dateTxt}${isToday?' · hoy':''}</span></div>
    ${isToday&&(hasGym||hasHome)?`<button class="compactbtn ${compactOn?'on':''}" onclick="toggleCompact('${dsS}')">${compactOn?'▸ detalle':'▾ detalle'}</button>`:''}
  </div>`;

  if(!hasGym&&!hasHome){
    html+=`<div class="rest"><div class="big">🛌</div><h2>Día de descanso</h2><p>El músculo crece cuando descansas.</p>
    ${isToday?`<button class="addbtn" style="margin-top:22px" onclick="pickRoutine('${dsS}')">💪 Quiero entrenar hoy de todas formas</button>`:''}</div>`;
    sec.innerHTML=html;return;
  }

  /* ---- BLOQUE GYM ---- */
  if(hasGym){
    const tot=totalSets(dayKey);
    if(isToday){
      const e2=getEntry(dsS,dayKey);e2.day=dayKey;
      const dn=doneSets(e2);
      const pct=tot?Math.round(dn/tot*100):0;
      if(dn>=tot&&tot>0){
        const dur=e2.t0&&e2.t1?fmtDur(e2.t1-e2.t0):'';
        html+=`<div class="celebrate"><h2>¡Gym completado! 🔥</h2><p>${esc(day.label)} — ${tot} series${dur?' en '+dur:''}.</p></div>`;
      }
      html+=`<div class="blockhead">💪 GYM — ${esc(day.label)}</div>
      <div class="pbarbox"><div class="pbar"><i style="width:${pct}%"></i></div>
        <div class="pmeta"><span><b>${dn}</b> / ${tot} series</span><span>${pct}%</span></div></div>`;
      day.items.forEach(it=>{
        const e=exById(it.ex);if(!e)return;
        const d=e2.prog[it.ex]||0,rem=it.s-d;
        html+=exRowActive(e,it,d,rem,dsS,dayKey,'g');
      });
      save(K.log,LOG);
    }else if(isPast){
      const dn=doneSets(entry);
      html+=`<div class="blockhead">💪 GYM — ${esc(day.label)}</div>`;
      if(!entry||dn===0){
        html+=`<div class="previewnote">No hay registro de gym este día.</div>`;
        day.items.forEach(it=>{const e=exById(it.ex);if(!e)return;html+=roRow(e,it,null)});
      }else{
        const pct=tot?Math.round(dn/tot*100):0;
        const dur=entry.t0&&entry.t1?' · ⏱ '+fmtDur(entry.t1-entry.t0):'';
        html+=`<div class="pbarbox"><div class="pbar"><i style="width:${pct}%"></i></div>
          <div class="pmeta"><span><b>${dn}</b> / ${tot} series${dur}</span><span>${pct}%</span></div></div>`;

  if(hasHome){

    <div class="rehabnote">⚠️ Si el Aquiles amaneció rígido, salta gemelos hoy — retomas el próximo bloque.</div>`;

      const hDn=doneHSets(e2);
      const hPct=hTot?Math.round(hDn/hTot*100):0;
      if(hDn>=hTot&&hTot>0)html+=`<div class="celebrate" style="background:linear-gradient(135deg,#2C7A5E,var(--casa))"><h2>¡Casa completado! 🏠</h2><p>Gemelos y abs hechos — el Aquiles te lo agradece.</p></div>`;
      html+=`<div class="pbarbox"><div class="pbar hbar"><i style="width:${hPct}%"></i></div>
        <div class="pmeta"><span><b style="color:var(--casa)">${hDn}</b> / ${hTot} series</span><span>${hPct}%</span></div></div>`;
      hItems.forEach(it=>{
        const e=exById(it.ex);if(!e)return;
        const d=e2.hprog[it.ex]||0,rem=it.s-d;
        html+=exRowActive(e,it,d,rem,dsS,dayKey,'h');

        html+=`<div class="previewnote">No hay registro de casa este día.</div>`;

      }else{
        hItems.forEach(it=>{const e=exById(it.ex);if(!e)return;html+=roRow(e,it,(entry.hprog||{})[it.ex]||0)});
      }
    }else{
      hItems.forEach(it=>{const e=exById(it.ex);if(!e)return;html+=roRow(e,it,null)});
    }
  }
  sec.innerHTML=html;
  window.scrollTo(0,0);
}
function exRowActive(e,it,d,rem,dsS,dayKey,block){

function roRow(e,it,done){

  else right=`<span class="ro-count ${done>=it.s?'ok':(done>0?'mid':'')}">${done}/${it.s}</span>`;

    <div class="exmain"><div class="exname">${esc(e.name)}</div>

function tapSet(dsS,dayKey,exId,max,block){
  const entry=getEntry(dsS,dayKey);
  const bag=block==='h'?entry.hprog:entry.prog;
  const cur=bag[exId]||0;
  if(cur>=max)return;
  bag[exId]=cur+1;
  const now=Date.now();
  if(block==='g'){if(!entry.t0)entry.t0=now;entry.t1=now}
  save(K.log,LOG);
  const wk=parseDate(dsS).getDay();
  const done=block==='h'?doneHSets(entry):doneSets(entry);
  const tot=block==='h'?totalHSets(wk):totalSets(dayKey);
  const e=exById(exId);
  if(done>=tot){
    stopTimer();
    if(navigator.vibrate)navigator.vibrate([80,50,80,50,180]);
    openDay(dsS);
    if(block==='g')showSummary(dsS,dayKey,entry,tot);
    else toast('🏠 ¡Bloque casa completado! Gemelos y abs ✓',true);
    return;
  }
  if(navigator.vibrate)navigator.vibrate(25);
  startTimer(e,(cur+1)>=max?'Siguiente ejercicio 💪':null);
  openDay(dsS);
}

/* ================= CRONÓMETRO ================= */
let TMR={iv:null,end:0,v10:false};
function startTimer(e,customLbl){
  stopTimer();
  const secs=e.rest||90;
  TMR.end=Date.now()+secs*1000;
  TMR.v10=false;
  const bar=document.getElementById('timerbar');
  document.getElementById('tlbl').innerHTML='Descanso — <b>'+esc(e.name)+'</b>'+(customLbl?'<br>'+customLbl:'');
  bar.classList.add('show');bar.classList.remove('alert');
  tickTimer();
  TMR.iv=setInterval(tickTimer,250);
}
function tickTimer(){
  const left=Math.max(0,Math.ceil((TMR.end-Date.now())/1000));
  document.getElementById('ttime').textContent=Math.floor(left/60)+':'+String(left%60).padStart(2,'0');
  if(left<=10&&!TMR.v10){TMR.v10=true;if(navigator.vibrate)navigator.vibrate([60,60,60]);}
  if(left<=0){
    clearInterval(TMR.iv);TMR.iv=null;
    if(navigator.vibrate)navigator.vibrate([250,100,250,100,400]);
    const bar=document.getElementById('timerbar');
    bar.classList.add('alert');
    document.getElementById('tlbl').innerHTML='<b>¡Siguiente serie! 💪</b>';
    document.getElementById('ttime').textContent='0:00';
    setTimeout(()=>{if(!TMR.iv)stopTimer()},4000);
  }
}
function stopTimer(){
  if(TMR.iv){clearInterval(TMR.iv);TMR.iv=null}
  document.getElementById('timerbar').classList.remove('show','alert');
}

/* ================= SUGERENCIAS ================= */
function lastSessionsFor(exId,n){
  const dates=Object.keys(LOG).sort().reverse();
  const out=[];
  for(const ds of dates){
    const e=LOG[ds];const wk=parseDate(ds).getDay();
    const gk=e.day!=null?e.day:wk;
    const itG=(RT[gk]&&RT[gk].items||[]).find(i=>i.ex===exId);
    if(itG){out.push({ds,done:(e.prog||{})[exId]||0,s:itG.s});if(out.length>=n)break;continue}
    const itH=(HR[wk]&&HR[wk].items||[]).find(i=>i.ex===exId);
    if(itH){out.push({ds,done:(e.hprog||{})[exId]||0,s:itH.s});if(out.length>=n)break}
  }
  return out;
}
function suggestions(){
  const out=[];const tds=todayStr();
  EX.forEach(e=>{
    const hist=WH[e.id]||[];
    const lastChange=hist.length?hist[hist.length-1].d:null;
    if(!lastChange||daysBetween(lastChange,tds)<21)return;
    const ses=lastSessionsFor(e.id,3);
    if(ses.length<3)return;
    if(daysBetween(ses[0].ds,tds)>10)return;
    if(!ses.every(x=>x.done>=x.s))return;
    out.push({e,rehab:REHAB_IDS.includes(e.id)});
  });
  return out;
}

/* ================= STATS ================= */
let statMode='sem',statOff=0,statMeasure='cintura';
function inRange(ds,a,b){return ds>=a&&ds<=b}
function weightUpsInRange(a,b){
  let c=0;
  Object.values(WH).forEach(h=>{h.forEach((x,i)=>{if(i>0&&inRange(x.d,a,b))c++})});
  return c;
}
function idxCards(){
  const cin=latest('cintura'),cad=latest('cadera'),pes=latest('peso'),
        cue=latest('cuello'),pec=latest('pecho_m'),hom=latest('hombros');
  const cards=[];
  function cls(v,goodMax,midMax){return v==null?'':(v<goodMax?'i-good':(v<midMax?'i-mid':'i-bad'))}
  if(cin&&cad){const icc=cin/cad;cards.push({n:'ICC cintura/cadera',v:icc.toFixed(2),c:cls(icc,0.90,0.95),m:'meta < 0.90'})}
  if(cin){const ica=cin/HEIGHT;cards.push({n:'ICA cintura/altura',v:ica.toFixed(2),c:cls(ica,0.50,0.55),m:'meta < 0.50'})}
  if(pes){const imc=pes/Math.pow(HEIGHT/100,2);cards.push({n:'IMC',v:imc.toFixed(1),c:cls(imc,25,30),m:'referencia general'})}
  if(cin&&cue&&cin>cue){
    const bf=495/(1.0324-0.19077*Math.log10(cin-cue)+0.15456*Math.log10(HEIGHT))-450;
    cards.push({n:'% Grasa (Navy)',v:bf.toFixed(1)+'%',c:bf<18?'i-good':(bf<25?'i-mid':'i-bad'),m:'baja aunque el peso no'});
  }else cards.push({n:'% Grasa (Navy)',v:'—',c:'',m:'registra cuello para calcular'});
  if(hom&&cin){const r=hom/cin;cards.push({n:'Hombro / Cintura',v:r.toFixed(2),c:r>=1.4?'i-good':(r>=1.25?'i-mid':''),m:'estético: 1.4+'})}
  else cards.push({n:'Hombro / Cintura',v:'—',c:'',m:'registra hombros para calcular'});
  if(pec&&cin){const d=pec-cin;cards.push({n:'Pecho − Cintura',v:(d>0?'+':'')+d.toFixed(1)+' cm',c:d>=10?'i-good':(d>=5?'i-mid':''),m:'si sube, la grasa terca cede'})}
  else cards.push({n:'Pecho − Cintura',v:'—',c:'',m:'registra pecho para calcular'});
  return cards;
}
function measureLineChart(k){
  const m=MEASURES.find(x=>x.k===k);
  const hist=(MS[k]||[]);
  if(hist.length<2)return `<p class="hint" style="margin:22px 0">Necesitas al menos 2 registros de ${m.n.toLowerCase()} para ver la curva 📈</p>`;
  const vals=hist.map(h=>h.v);
  let min=Math.min(...vals),max=Math.max(...vals);
  if(m.goal){min=Math.min(min,m.goal);max=Math.max(max,m.goal)}
  const pad=(max-min)*0.15||2;min-=pad;max+=pad;
  const W=320,H=150,L=34,B=18;
  const px=i=>L+(i/(hist.length-1))*(W-L-8);
  const py=v=>(H-B)-((v-min)/(max-min))*(H-B-12);
  const pts=hist.map((h,i)=>px(i).toFixed(1)+','+py(h.v).toFixed(1)).join(' ');
  let goal='';
  if(m.goal)goal=`<line x1="${L}" y1="${py(m.goal)}" x2="${W-8}" y2="${py(m.goal)}" stroke="var(--amber)" stroke-width="1" stroke-dasharray="4 4"/><text x="${W-8}" y="${py(m.goal)-4}" fill="var(--amber)" font-size="9" text-anchor="end">meta ${m.goal}</text>`;
  const dots=hist.map((h,i)=>`<circle cx="${px(i)}" cy="${py(h.v)}" r="3" fill="var(--green)"/>`).join('');
  const first=hist[0],last=hist[hist.length-1];
  return `<svg class="linechart" viewBox="0 0 ${W} ${H}">
    <text x="4" y="${py(max-pad)+4}" fill="var(--muted)" font-size="9">${(max-pad).toFixed(0)}</text>
    <text x="4" y="${py(min+pad)+4}" fill="var(--muted)" font-size="9">${(min+pad).toFixed(0)}</text>
    ${goal}
    <polyline points="${pts}" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    <text x="${L}" y="${H-4}" fill="var(--muted)" font-size="9">${first.d.slice(5)}</text>
    <text x="${W-8}" y="${H-4}" fill="var(--muted)" font-size="9" text-anchor="end">${last.d.slice(5)} · ${last.v} ${m.u}</text>
  </svg>`;
}
function renderStats(){
  const sec=document.getElementById('sec-stats');
  const now=new Date();
  let bars=[],title='',a='',b='';
  function gh(ds){const e=LOG[ds];return{g:doneSets(e),h:doneHSets(e)}}
  if(statMode==='sem'){
    const mon=new Date(now);mon.setDate(mon.getDate()-((mon.getDay()+6)%7)+statOff*7);
    a=todayStr(mon);
    const sun=new Date(mon);sun.setDate(sun.getDate()+6);b=todayStr(sun);
    title=mon.getDate()+' '+MESES[mon.getMonth()].slice(0,3)+' – '+sun.getDate()+' '+MESES[sun.getMonth()].slice(0,3);
    for(let i=0;i<7;i++){
      const d=new Date(mon);d.setDate(d.getDate()+i);
      const x=gh(todayStr(d));
      bars.push({l:['L','M','X','J','V','S','D'][i],g:x.g,h:x.h});
    }
  }else if(statMode==='mes'){
    const m=new Date(now.getFullYear(),now.getMonth()+statOff,1);
    a=todayStr(m);
    const end=new Date(m.getFullYear(),m.getMonth()+1,0);b=todayStr(end);
    title=MESES[m.getMonth()]+' '+m.getFullYear();
    const daysIn=end.getDate();
    const weeks=[[1,7],[8,14],[15,21],[22,28],[29,daysIn]].filter(w=>w[0]<=daysIn);
    weeks.forEach((w,i)=>{
      let g=0,h=0;
      for(let d=w[0];d<=Math.min(w[1],daysIn);d++){const x=gh(todayStr(new Date(m.getFullYear(),m.getMonth(),d)));g+=x.g;h+=x.h}
      bars.push({l:'S'+(i+1),g,h});
    });
  }else{
    const y=now.getFullYear()+statOff;
    a=y+'-01-01';b=y+'-12-31';title=String(y);
    for(let mm=0;mm<12;mm++){
      let g=0,h=0;
      Object.keys(LOG).forEach(ds=>{if(ds.startsWith(y+'-'+String(mm+1).padStart(2,'0'))){const x=gh(ds);g+=x.g;h+=x.h}});
      bars.push({l:MESES[mm][0],g,h});
    }
  }
  let fullDays=0,totSeries=0,homeDays=0;
  Object.keys(LOG).forEach(ds=>{
    if(!inRange(ds,a,b))return;
    const e=LOG[ds];const wk=parseDate(ds).getDay();
    const kk=e.day!=null?e.day:wk;
    const tot=totalSets(kk),dn=doneSets(e),hd=doneHSets(e);
    totSeries+=dn+hd;
    if(tot>0&&dn>=tot)fullDays++;
    const ht=totalHSets(wk);
    if(ht>0&&hd>=ht)homeDays++;
  });
  const ups=weightUpsInRange(a,b);
  const max=Math.max(1,...bars.map(x=>x.g+x.h));
  let barhtml='';
  bars.forEach(x=>{
    const tot=x.g+x.h;
    const gH=Math.round(x.g/max*100),hH=Math.round(x.h/max*100);
    barhtml+=`<div class="barcol"><div class="barstack">
      ${x.h>0?`<div class="barv hpart" style="height:${Math.max(2,hH)}%"></div>`:''}
      <div class="barv ${tot===0?'zero':''}" style="height:${Math.max(3,gH)}%;${tot===0?'background:var(--surface2)':''}">${tot>0?'<em>'+tot+'</em>':''}</div>
    </div><div class="barl">${x.l}</div></div>`;
  });
  const idx=idxCards();
  let idxhtml='';
  idx.forEach(c=>{idxhtml+=`<div class="idxcard"><div class="iname">${c.n}</div><div class="ival ${c.c}">${c.v}</div><div class="imeta">${c.m}</div></div>`});
  let chips='';
  MEASURES.forEach(m=>{chips+=`<button class="${statMeasure===m.k?'sel':''}" onclick="statMeasure='${m.k}';renderStats()">${m.ico} ${m.n}</button>`});
  sec.innerHTML=`
  <div class="segbar">
    <button class="${statMode==='sem'?'sel':''}" onclick="statMode='sem';statOff=0;renderStats()">Semana</button>
    <button class="${statMode==='mes'?'sel':''}" onclick="statMode='mes';statOff=0;renderStats()">Mes</button>
    <button class="${statMode==='ano'?'sel':''}" onclick="statMode='ano';statOff=0;renderStats()">Año</button>
  </div>
  <div class="statcards">
    <div class="scard"><b>${fullDays}</b><span>Gym completos</span></div>
    <div class="scard"><b style="color:var(--casa)">${homeDays}🏠</b><span>Casa completos</span></div>
    <div class="scard"><b>${ups}📈</b><span>Subidas de peso</span></div>
  </div>
  <div class="chartbox">
    <h3>Series (gym + casa) — ${title}
      <span class="cnav"><button onclick="statOff--;renderStats()">‹</button><button onclick="statOff++;renderStats()">›</button></span>
    </h3>
    <div class="bars">${barhtml}</div>
    <div class="chartlegend"><span><i style="background:var(--green)"></i>Gym</span><span><i style="background:var(--casa)"></i>Casa</span></div>
  </div>
  <div class="sechead">📏 Medidas e índices</div>
  <div class="idxgrid">${idxhtml}</div>
  <div class="chartbox">
    <div class="mchips">${chips}</div>
    ${measureLineChart(statMeasure)}
  </div>`;
}

        histRows+=`<div class="hrow"><span>${h.d} — ${h.v} ${m.u}</span><span class="delta ${cls}">${arrow} ${diff>0?'+':''}${diff} en ${days} día${days===1?'':'s'}</span></div>`;
      });
      histRows+=`<div class="hrow"><span>${hist[0].d} — ${hist[0].v} ${m.u}</span><span class="delta d-same">inicio</span></div>`;
    }
    html+=`<div class="mearow">
      <div class="mtop">
        <span class="ico">${m.ico}</span>
        <div class="nm"><b>${m.n}</b><span>${cur?'último: '+cur.d:'sin registros'} · ${m.freq}</span></div>
        ${cur?`<span class="val">${cur.v} ${m.u}</span>`:''}
        <button class="addm" onclick="addMeasure('${m.k}')">＋</button>
      </div>

      <button class="htoggle" onclick="const x=document.getElementById('mh-${m.k}');x.style.display=x.style.display==='none'?'block':'none';this.textContent=x.style.display==='none'?'▾ ver historial ('+${hist.length}+')':'▴ ocultar'">▾ ver historial (${hist.length})</button>`:''}
    </div>`;
  });
  html+=`<p class="hint">Cintura, cadera y peso: quincenal (viernes 📅) · el resto: mensual</p>`;
  sec.innerHTML=html;
}
function addMeasure(k){
  const m=MEASURES.find(x=>x.k===k);
  const hist=MS[k]||[];
  const last=hist.length?hist[hist.length-1].v:'';
  openModal(`<h2>${m.ico} ${m.n}</h2><div class="sub">${hist.length?'Último registro: '+last+' '+m.u:'Primer registro'}</div>
  <input id="minput" type="number" step="0.1" inputmode="decimal" placeholder="Valor en ${m.u}" value="">
  <input id="mdate" type="date" value="${todayStr()}">
  <div class="mbtns"><button class="mb-no" onclick="closeModal()">Cancelar</button>
  <button class="mb-ok" onclick="saveMeasure('${k}')">Guardar</button></div>`);
}
function saveMeasure(k){
  const v=parseFloat(document.getElementById('minput').value);
  const d=document.getElementById('mdate').value||todayStr();
  if(isNaN(v)||v<=0){alert('Ingresa un valor válido');return}
  if(!MS[k])MS[k]=[];
  MS[k].push({d,v});
  MS[k].sort((x,y)=>x.d<y.d?-1:1);
  save(K.ms,MS);
  const m=MEASURES.find(x=>x.k===k);
  const hist=MS[k];
  if(hist.length>1){
    const prev=hist[hist.length-2],curr=hist[hist.length-1];
    const diff=+(curr.v-prev.v).toFixed(1);
    const days=daysBetween(prev.d,curr.d);
    if(diff<0)toast(`⬇️ Bajaste ${Math.abs(diff)} ${m.u} en ${days} días`,true);
    else if(diff>0)toast(`⬆️ Subiste ${diff} ${m.u} en ${days} días`,true);
    else toast('Sin cambios desde el último registro');
  }else toast('Registro guardado 📏');
  closeModal();renderMedidas();
}

/* ================= PROGRESIÓN ================= */
function sparkline(hist){
  const nums=hist.map(h=>numOf(h.w)).filter(x=>x!=null);
  if(nums.length<2)return '';
  const min=Math.min(...nums),max=Math.max(...nums),rng=max-min||1;
  const W=110,H=22,step=W/(nums.length-1);
  const pts=nums.map((n,i)=>`${(i*step).toFixed(1)},${(H-2-((n-min)/rng)*(H-6)).toFixed(1)}`).join(' ');
  return `<svg class="spark" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function isPR(id){
  const hist=WH[id]||[];
  if(hist.length<2)return false;
  const nums=hist.map(h=>numOf(h.w)).filter(x=>x!=null);
  if(nums.length<2)return false;
  return nums[nums.length-1]>Math.max(...nums.slice(0,-1));
}
function renderEjer(){
  const sec=document.getElementById('sec-ejer');
  const sugs=suggestions();
  let sughtml='';
  if(sugs.length){
    sughtml=`<div class="sugbox"><h3>💡 Puedes probar subir peso</h3><ul>`;
    sugs.forEach(s=>{
      if(s.rehab)sughtml+=`<li class="warn"><b>${esc(s.e.name)}</b> — 3+ semanas cumpliendo. Por la rehab del Aquiles: progresión chica (+5 kg máx o siguiente nivel) y solo sin molestias.</li>`;
      else sughtml+=`<li><b>${esc(s.e.name)}</b> — 3+ semanas cumpliendo todas las series con el mismo peso. Tu cuerpo ya se adaptó.</li>`;
    });
    sughtml+=`</ul></div>`;
  }
  const order=['Pecho','Hombro','Tríceps','Espalda','Bíceps','Pierna','Glúteo','Gemelo','Abs'];
  let html='<p style="color:var(--muted);font-size:12.5px;margin:4px 0 16px">Toca ✎ cuando subas de peso — se guarda con fecha para ver tu progresión.</p>'+sughtml;
  order.forEach(m=>{
    const list=EX.filter(e=>e.m===m);
    if(!list.length)return;
    html+=`<div class="mgroup"><h3><i style="background:${MUSCLES[m]}"></i>${m}${(m==='Gemelo'||m==='Abs')?' 🏠':''}</h3>`;
    list.forEach(e=>{
      const hist=WH[e.id]||[];
      const pr=isPR(e.id)?' 🏆':'';
      html+=`<div class="exrow">
        <div class="nm"><b>${esc(e.name)}${pr}</b><span>${hist.length>1?hist.length+' registros':'peso inicial'}</span>${sparkline(hist)}</div>
        <div class="wt">${esc(e.w)}</div>
        <button class="edit" onclick="editWeight(${e.id})">✎</button>
      </div>`;
    });
    html+='</div>';
  });
  sec.innerHTML=html;
}
function editWeight(id){
  const e=exById(id);
  const hist=(WH[id]||[]).slice(-5).reverse();
  let hh='';
  if(hist.length)hh='<ul class="whist">'+hist.map(h=>`<li>📅 ${h.d} — ${esc(h.w)}</li>`).join('')+'</ul>';
  openModal(`<h2>${esc(e.name)}</h2><div class="sub">Peso actual: <b style="color:var(--green)">${esc(e.w)}</b></div>
  ${hh}
  <input id="winput" placeholder="Nuevo peso (ej: 25 kg x lado)" value="${esc(e.w)}">
  <div class="mbtns">
    <button class="mb-no" onclick="closeModal()">Cancelar</button>
    <button class="mb-ok" onclick="saveWeight(${id})">Guardar</button>
  </div>`);
}
function saveWeight(id){
  const v=document.getElementById('winput').value.trim();
  if(!v)return;
  const e=exById(id);
  if(v!==e.w){
    const prevMax=Math.max(...(WH[id]||[]).map(h=>numOf(h.w)).filter(x=>x!=null),0);
    e.w=v;
    if(!WH[id])WH[id]=[];
    WH[id].push({d:todayStr(),w:v});
    save(K.ex,EX);save(K.wh,WH);
    const n=numOf(v);
    if(n!=null&&n>prevMax&&prevMax>0)toast('🏆 ¡NUEVO RÉCORD en '+e.name+'!',true);
    else toast('Peso actualizado 💪');
  }
  closeModal();renderEjer();
}

/* ================= RUTINA ================= */
let rutDay=1;
function renderRutina(){
  const sec=document.getElementById('sec-rutina');
  let tabs='';
  [1,2,3,4,5,6].forEach(d=>{
    tabs+=`<button class="${rutDay===d?'sel':''}" onclick="rutDay=${d};renderRutina()">${DIAS[d].slice(0,3)} · ${esc(RT[d].label)}${HR[d]?' 🏠':''}</button>`;
  });
  let rows=`<div class="blockhead">💪 GYM</div>`;
  RT[rutDay].items.forEach((it,idx)=>{rows+=rutRow(it,idx,'g')});
  rows+=`<button class="addbtn" onclick="addItem('g')">+ Agregar ejercicio (gym)</button>`;
  rows+=`<div class="blockhead" style="color:var(--casa)">🏠 CASA</div>`;
  if(HR[rutDay]&&HR[rutDay].items.length){
    HR[rutDay].items.forEach((it,idx)=>{rows+=rutRow(it,idx,'h')});
    rows+=`<button class="addbtn" onclick="addItem('h')">+ Agregar ejercicio (casa)</button>`;
  }else{
    rows+=`<button class="addbtn" onclick="addHomeBlock()">+ Activar bloque casa este día</button>`;
  }
  sec.innerHTML=`<div class="dayselect">${tabs}</div>${rows}
  <div class="backup"><h3>Respaldo de datos</h3>
  <p>Tus datos viven solo en este dispositivo. Exporta un respaldo de vez en cuando por si cambias de celular o limpias el navegador. Último respaldo: <b>${load(K.bk,'—')}</b></p>
  <div class="btns"><button onclick="exportData()">⬇ Exportar</button><button onclick="importData()">⬆ Importar</button></div></div>`;
}
function rutRow(it,idx,block){
  const e=exById(it.ex);if(!e)return '';
  const col=MUSCLES[e.m];
  const src=block==='h'?'HR':'RT';
  return `<div class="rrow">
    <div class="top"><span class="rtag" style="background:${col}22;color:${col}">${esc(e.m)}</span><b>${esc(e.name)}</b>
    <button class="del" onclick="delItem(${idx},'${block}')">✕</button></div>
    <div class="ctrl">
      <label>Series<input type="number" min="1" max="10" value="${it.s}" onchange="${src}[rutDay].items[${idx}].s=Math.max(1,+this.value||1);save(K.${block==='h'?'hr':'rt'},${src})"></label>
      <label>Reps<input type="text" value="${esc(it.r)}" onchange="${src}[rutDay].items[${idx}].r=this.value;save(K.${block==='h'?'hr':'rt'},${src})"></label>
      <label>Desc. (seg)<input type="number" min="15" max="600" step="15" value="${e.rest}" onchange="exById(${it.ex}).rest=Math.max(15,+this.value||90);save(K.ex,EX)"></label>
    </div>
  </div>`;
}
function delItem(idx,block){
  const src=block==='h'?HR:RT;
  const it=src[rutDay].items[idx],e=exById(it.ex);
  if(confirm('¿Quitar "'+e.name+'" ('+(block==='h'?'casa':'gym')+') del '+DIAS[rutDay]+'?')){
    src[rutDay].items.splice(idx,1);
    if(block==='h'&&src[rutDay].items.length===0)delete src[rutDay];
    save(block==='h'?K.hr:K.rt,src);renderRutina();
  }
}
function addHomeBlock(){
  HR[rutDay]=JSON.parse(JSON.stringify(DEFAULT_HOME[1]||{items:[]}));
  save(K.hr,HR);renderRutina();toast('Bloque casa activado 🏠');
}
function addItem(block){
  let opts=EX.map(e=>`<option value="${e.id}">${esc(e.m)} — ${esc(e.name)}</option>`).join('');
  openModal(`<h2>Agregar a ${esc(RT[rutDay].label)} (${block==='h'?'🏠 casa':'💪 gym'})</h2><div class="sub">Elige un ejercicio de tu catálogo</div>
  <select id="addsel">${opts}</select>
  <input id="addsets" type="number" placeholder="Series (ej: 3)" value="3" min="1" max="10">
  <input id="addreps" placeholder="Reps (ej: 10-12)" value="10-12">
  <div class="mbtns"><button class="mb-no" onclick="closeModal()">Cancelar</button>
  <button class="mb-ok" onclick="confirmAdd('${block}')">Agregar</button></div>`);
}
function confirmAdd(block){
  const ex=+document.getElementById('addsel').value;
  const s=Math.max(1,+document.getElementById('addsets').value||3);
  const r=document.getElementById('addreps').value||'10-12';
  const src=block==='h'?HR:RT;
  if(block==='h'&&!src[rutDay])src[rutDay]={items:[]};
  src[rutDay].items.push({ex,s,r});
  save(block==='h'?K.hr:K.rt,src);closeModal();renderRutina();toast('Ejercicio agregado');
}

/* ================= BACKUP ================= */
function exportData(){
  const data={ex:EX,rt:RT,hr:HR,log:LOG,wh:WH,ms:MS,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='gymtrack-respaldo-'+todayStr()+'.json';
  a.click();URL.revokeObjectURL(a.href);
  localStorage.setItem(K.bk,JSON.stringify(todayStr()));
  toast('Respaldo descargado');
  renderInicio();
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=()=>{
    const f=inp.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const d=JSON.parse(rd.result);
        if(!d.ex||!d.rt)throw 0;
        EX=d.ex;RT=d.rt;LOG=d.log||{};WH=d.wh||{};if(d.ms)MS=d.ms;if(d.hr)HR=d.hr;
        HOME_EX.forEach(he=>{if(!EX.find(e=>e.id===he.id))EX.push(JSON.parse(JSON.stringify(he)))});
        EX.forEach(e=>{if(e.rest==null)e.rest=COMPOUND.includes(e.id)?150:90});
        ['pantorrilla','cuello','pecho_m','hombros'].forEach(k=>{if(!MS[k])MS[k]=[]});
        if(!HR)HR=JSON.parse(JSON.stringify(DEFAULT_HOME));
        save(K.ex,EX);save(K.rt,RT);save(K.hr,HR);save(K.log,LOG);save(K.wh,WH);save(K.ms,MS);
        toast('Datos restaurados ✓');go('inicio');
      }catch(e){alert('Archivo no válido')}
    };
    rd.readAsText(f);
  };
  inp.click();
}

/* ================= MODAL ================= */
function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modalbg').classList.add('open')}
function closeModal(){document.getElementById('modalbg').classList.remove('open')}

/* ================= INIT ================= */
renderInicio();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
